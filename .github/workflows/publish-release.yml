name: Publish GitHub release
on:
  pull_request:
    branches:
      - master
      - main
    types:
      - closed

  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    if: |
      (github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'Type: Release')) || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      id-token: write  # OIDC
      pull-requests: write  # PR comment

    name: check version, add tag and release
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Get package info
      id: package
      run: |
        VERSION=$(jq -r '.version' package.json)
        PACKAGE_NAME=$(jq -r '.name' package.json)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "name=$PACKAGE_NAME" >> $GITHUB_OUTPUT

    - name: Install pnpm
      uses: pnpm/setup@5d160c5bc68a09337ad0d5654e237e03253b5879 # v1.0.0

    - name: Build
      run : pnpm build

    - name: Create GitHub Release with tag
      id: create-release
      run: |
        RELEASE_URL=$(gh release create "v$VERSION" \
          --title "v$VERSION" \
          --target "$SHA" \
          --notes "$PR_BODY")
        echo "url=$RELEASE_URL" >> $GITHUB_OUTPUT
      env:
        GH_TOKEN: ${{ github.token }}
        VERSION: ${{ steps.package.outputs.version }}
        SHA: ${{ github.sha }}
        PR_BODY: ${{ github.event.pull_request.body }}

    - name: Comment on PR - Success
      if: |
        always() &&
        github.event_name == 'pull_request' &&
        success()
      run: |
        gh pr comment "$PR_NUMBER" \
          --body "âś… **Release v$VERSION completed successfully!**

        - đźŹ·ď¸Ź GitHub Release: $RELEASE_URL
        - đź”— Workflow run: $SERVER_URL/$REPOSITORY/actions/runs/$RUN_ID"
      env:
        GH_TOKEN: ${{ github.token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        VERSION: ${{ steps.package.outputs.version }}
        PACKAGE_NAME: ${{ steps.package.outputs.name }}
        RELEASE_URL: ${{ steps.create-release.outputs.url }}
        SERVER_URL: ${{ github.server_url }}
        REPOSITORY: ${{ github.repository }}
        RUN_ID: ${{ github.run_id }}

    - name: Comment on PR - Failure
      if: |
        always() &&
        github.event_name == 'pull_request' &&
        failure()
      run: |
        gh pr comment "$PR_NUMBER" \
          --body "âťŚ **Release v$VERSION failed**

        Please check the workflow logs for details.
        đź”— Workflow run: $SERVER_URL/$REPOSITORY/actions/runs/$RUN_ID"
      env:
        GH_TOKEN: ${{ github.token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        VERSION: ${{ steps.package.outputs.version }}
        SERVER_URL: ${{ github.server_url }}
        REPOSITORY: ${{ github.repository }}
        RUN_ID: ${{ github.run_id }}
